# ════════════════════════════════════════════════════════════════════════════
# static_config.yaml  —  iteration 6
#
# Three task processors:
#   main-task-processor  — foreground requests (handlers run here)
#   bg-enrichment        — background deep-scan worker (1 thread, low priority)
#   fs-blocking          — SQLite blocking I/O offload (2 threads)
# ════════════════════════════════════════════════════════════════════════════

task_processors:
  main-task-processor:
    worker_threads: 4
    thread_name: main-worker

  bg-enrichment:
    worker_threads: 1
    thread_name: bg-enrich
    # userver schedules lower-thread-count pools after higher ones when
    # there is CPU contention; the 1-thread pool naturally yields to main.

  fs-blocking:
    worker_threads: 2
    thread_name: fs-blocking

default_task_processor: main-task-processor

components_manager:
  components:
    # ── Userver built-ins ───────────────────────────────────────────────────
    server:
      listener:
        port: 8080
        task_processor: main-task-processor

    dns-client:
      fs-task-processor: fs-blocking

    http-client:
      fs-task-processor: fs-blocking
      user-agent: six-feat/6

    logging:
      fs-task-processor: fs-blocking
      loggers:
        default:
          file_path: '@stdout'
          level: info

    # ── L1 persistent store ─────────────────────────────────────────────────
    persistent-store:
      backend: sqlite
      path: /var/lib/six_feat/six_feat.db

    # ── Network layer ───────────────────────────────────────────────────────
    genius-gateway:
      genius-api-token: $GENIUS_API_TOKEN
      genius-base-url: https://api.genius.com
      songs-limit-fg: 10
      songs-limit-bg: 80
      match-threshold: 0.9
      backoff-max-attempts: 4
      backoff-base-ms: 200
      backoff-cap-ms: 10000
      # Foreground lane: interactive requests
      lane-fg-tokens-per-sec: 8.0
      lane-fg-burst: 8
      lane-fg-max-concurrent: 3
      # Background lane: deep-scan worker (subordinate to FG)
      lane-bg-tokens-per-sec: 2.0
      lane-bg-burst: 2
      lane-bg-max-concurrent: 1
      # Circuit breaker
      cb-failure-threshold: 5
      cb-open-seconds: 30

    # ── L2 LRU + L1 read-through repository ────────────────────────────────
    artist-repository:
      l2-cache-max-artists: 512
      l2-cache-ttl-seconds: 1800

    # ── Background enrichment worker ────────────────────────────────────────
    enrichment-worker:
      queue-capacity: 1024

    # ── Orchestration layer ─────────────────────────────────────────────────
    collab-service:
      path-max-expand-rounds: 3

    # ── HTTP handlers ───────────────────────────────────────────────────────
    handler-graph:
      path: /api/v1/graph
      method: GET
      task_processor: main-task-processor

    handler-path:
      path: /api/v1/graph/path
      method: GET
      task_processor: main-task-processor

    handler-index:
      path: /
      method: GET
      task_processor: main-task-processor
      file-path: /usr/share/six_feat/index.html
      content-type: text/html; charset=utf-8

    handler-script:
      path: /app.js
      method: GET
      task_processor: main-task-processor
      file-path: /usr/share/six_feat/app.js
      content-type: application/javascript; charset=utf-8
