components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000

    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2

    default_task_processor: main-task-processor
    fs_task_processor: fs-task-processor

    components:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stdout'
                    level: info
                    overflow_behavior: discard

        dns-client:
            fs-task-processor: fs-task-processor

        http-client: {}

        handler-graph:
            path: /api/v1/graph
            method: GET
            task_processor: main-task-processor
            genius-api-token: $genius_token
            genius-base-url: https://api.genius.com

            # FIX #4 (fuzzy search): lower threshold so partial names like
            # "kendrick" still auto-resolve to "Kendrick Lamar" when the
            # backend's Levenshtein+substring similarity is >= 0.72.
            # Below this score the backend returns ambiguous=true and the
            # frontend shows the interactive candidate picker.
            # Range: 0.0–1.0. 0.72 is a good balance; raise to 0.85 if you
            # want the picker to appear more often (stricter auto-resolve).
            match-threshold: 0.72

            # songs-limit: 50 is a good balance between coverage and latency.
            # The backend caches results per (artist_id, role_mask) so
            # subsequent loads with the same filters are instant.
            songs-limit: 50

        handler-index:
            path: /
            method: GET
            task_processor: main-task-processor
            file-path: front/index.html
            content-type: 'text/html; charset=utf-8'

        handler-script:
            path: /script.js
            method: GET
            task_processor: main-task-processor
            file-path: front/script.js
            content-type: 'application/javascript; charset=utf-8'