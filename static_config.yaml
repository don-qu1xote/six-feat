components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000

    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2

    default_task_processor: main-task-processor
    fs_task_processor: fs-task-processor

    components:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stdout'
                    level: info
                    overflow_behavior: discard

        dns-client:
            fs-task-processor: fs-task-processor

        http-client: {}

        # ── Shared Genius API client ──────────────────────────────────────
        # All I/O, caching, and resilience live here.
        # Both handler-graph and handler-path reference this component.
        genius-client:
            genius-api-token: $genius_token
            genius-base-url: https://api.genius.com
            songs-limit: 50
            match-threshold: 0.72
            cache-max-artists: 512
            cache-ttl-seconds: 1800
            cb-failure-threshold: 5
            cb-open-seconds: 30
            backoff-max-attempts: 4
            backoff-base-ms: 200
            backoff-cap-ms: 10000

        # ── Radial collaboration graph ────────────────────────────────────
        # GET /api/v1/graph?artist=…&roles=…
        # Response: { "type":"graph", nodes[{betweenness,…}], edges[…] }
        handler-graph:
            path: /api/v1/graph
            method: GET
            task_processor: main-task-processor

        # ── Six-degrees pathfinder ────────────────────────────────────────
        # GET /api/v1/graph/path?from=…&to=…&roles=…
        # Response: { "type":"path", hops:N, path:[id,…], nodes[{betweenness,…}], edges[{songs:[…],…}] }
        #
        # path-max-expand-rounds: how many rounds of lazy Genius API fetches
        # to attempt before giving up.  Each round costs up to songs-limit
        # API calls per frontier node (parallelised with utils::Async).
        # Round 0: only data already in cache.
        # Round 1: fetch songs for all nodes reachable from src/dst.
        # Round 2: fetch songs for nodes at depth 2.
        # Round 3: fetch songs for nodes at depth 3 (≈ 6 hops worst case).
        handler-path:
            path: /api/v1/graph/path
            method: GET
            task_processor: main-task-processor
            path-max-expand-rounds: 3

        handler-index:
            path: /
            method: GET
            task_processor: main-task-processor
            file-path: front/index.html
            content-type: 'text/html; charset=utf-8'

        handler-script:
            path: /script.js
            method: GET
            task_processor: main-task-processor
            file-path: front/script.js
            content-type: 'application/javascript; charset=utf-8'